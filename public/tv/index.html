<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Abholanzeige - Stadt Kebap & Pizzeria</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="tv-header">
    <span>🥙 Stadt Kebap &amp; Pizzeria</span>
    <span class="tv-status" id="connectionStatus">* Verbinde ...</span>
</header>


<main class="tv-columns">
    <section class="tv-column ready">
        <h2>Fertig zur Abholung</h2>
        <div class="tv-numbers" id="readyNumbers"></div>
    </section>
    <section class="tv-column preparing">
        <h2>In Zubereitung</h2>
        <div class="tv-numbers" id="preparingNumbers"></div>
    </section>
</main>

<footer class="tv-footer">Vielen Dank für eure Bestellung!</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
