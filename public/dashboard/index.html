<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mitarbeiter-Dashboard – Stadt Kebap & Pizzeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="emoji">🥙</span>
      <div>
        <strong>Stadt Kebap</strong>
        <small>&amp; Pizzeria</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="neu">
        <span>📋 Bestellungen</span>
        <span class="badge" id="badgeNeu">0</span>
      </button>
      <button class="nav-item" data-view="in_zubereitung">
        <span>👨‍🍳 In Zubereitung</span>
        <span class="badge muted" id="badgeZubereitung">0</span>
      </button>
      <button class="nav-item" data-view="fertig">
        <span>✅ Fertig</span>
        <span class="badge muted" id="badgeFertig">0</span>
      </button>
      <button class="nav-item" data-view="alle">
        <span>🧾 Alle Bestellungen</span>
      </button>
      <button class="nav-item" data-view="produkte">
        <span>🛒 Produkte</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button id="testSoundBtn" style="margin-top:8px;">🔊 Sound testen</button>
      <label class="autoprint-toggle">
        <span>Automatisch drucken</span>
        <input type="checkbox" id="autoPrintToggle" />
      </label>
      <div class="connection-status" id="connectionStatus">● verbinde …</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="main-header">
      <h1 id="viewTitle">Neue Bestellungen</h1>
      <span class="today" id="todayLabel"></span>
    </header>

    <div class="orders-grid" id="ordersGrid">
      <p class="empty">Bestellungen werden geladen …</p>
    </div>

    <div class="products-view hidden" id="productsView">
      <button class="btn-add-product" id="addProductBtn">+ Neues Produkt</button>
      <div class="products-list" id="productsList"></div>
    </div>
  </main>
</div>

<!-- Druckvorlage (nur beim Drucken sichtbar) -->
<div id="printArea" class="print-area"></div>

<!-- Produkt anlegen oder bearbeiten (Modal) -->
<div class="modal-overlay hidden" id="productFormOverlay">
  <section class="modal">
    <button class="modal-close" id="productFormClose">x</button>
    <h2 id="productFormTitle">Neues Produkt</h2>

    <form id="productForm">
      <label>
        Name
        <input type="text" id="pfName" required />
      </label>

      <label>
        Kategorie
        <input type="text" id="pfCategory" list="categoryOptions" required placeholder="z.B. Kebap & Dürüm"/>
        <datalist id="categoryOptions"></datalist>
      </label>

      <label>
        Beschreibung
        <textarea id="pfDescription" rows="2"></textarea>
      </label>

      <div class="form-row">
        <label>
          Basispreis (€)
          <input type="number" id="pfBasePrice" step="0.01" min="0" required />
        </label>

        <label>
          Emoji
          <input type="text" id="pfEmoji" maxlength="4" placeholder="🍽️" />
        </label>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" id="pfPopular" />
        Als "Beliebt" markieren
      </label>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="productFromCancel">Abbrechen</button>
        <button type="submit" class="btn-save">Speichern</button>
      </div>

      <!-- Options-Gruppen-Editor ins Formular einfügen -->
      <div class="option-group-editor">
        <div class="option-groups-header">
          <h3>Options-Gruppen</h3>
          <button type="button" class="btn-add-group" id="addGroupBtn">+ Gruppe</button>
        </div>
        <div id="optionGroupsList"></div>
      </div>

    </form>
  </section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
